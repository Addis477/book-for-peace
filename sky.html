<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Canvas - Peace for You Network</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .sky-full {
            min-height: 100vh;
            padding: 100px 20px 40px;
            background: #0B1A2F;
        }
        .sky-title {
            font-size: 3rem;
            color: #FDB813;
            text-align: center;
            margin-bottom: 2rem;
        }
        .sky-canvas {
            height: 500px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .time-indicator {
            text-align: center;
            margin: 2rem 0;
            color: white;
        }
        .time-badge {
            background: rgba(253,184,19,0.2);
            border: 1px solid #FDB813;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">🕊️ Peace for You Network</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="sky.html" class="active">SKY</a></li>
                <li><a href="book.html">BOOK</a></li>
                <li><a href="peace-map.html">PEACE MAP</a></li>
                <li><a href="our-story.html">OUR STORY</a></li>
                <li><a href="#" class="access-btn">🔑 GET ACCESS</a></li>
            </ul>
        </div>
    </nav>

    <main class="sky-full">
        <h1 class="sky-title">☁️ The Sky Canvas</h1>
        <div class="sky-canvas" id="fullSky"></div>
        <div class="time-indicator">
            <span class="time-badge" id="currentTime">Live Sky</span>
        </div>
    </main>

    <div class="ai-guide" id="aiGuide">
        <div class="guide-icon">🕊️</div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">🕊️ Peace for You Network · © 2026</div>
                <div class="footer-social">
                    <span>FOLLOW US:</span>
                    <a href="https://t.me/bookforpeace">📱 Telegram: @bookforpeace</a>
                    <a href="https://tiktok.com/@peaceforyounetwork">🎵 TikTok: @peaceforyounetwork</a>
                </div>
                <div class="footer-links">
                    <a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="sky.js"></script>
    <script>
        document.getElementById('aiGuide').onclick = () => alert('🕊️ AI Peace Guide\n\nHow can I help you?');
        
        const times = {
            dawn: 'Dawn 🌅', morning: 'Morning ☀️', afternoon: 'Afternoon 🌤️',
            evening: 'Evening 🌆', sunset: 'Sunset 🌇', night: 'Night 🌙'
        };
        
        function updateTimeDisplay() {
            const timeDisplay = document.getElementById('currentTime');
            if (window.currentTimeOfDay) {
                timeDisplay.textContent = times[window.currentTimeOfDay] || 'Live Sky';
            }
        }
        
        setInterval(updateTimeDisplay, 1000);
    </script>
</body>
</html>
