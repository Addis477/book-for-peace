<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peace Map - Peace for You Network</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .map-header {
            text-align: center;
            padding: 120px 20px 40px;
            background: linear-gradient(135deg, #0B1A2F, #1a3a5a);
        }
        .map-title {
            font-size: 3rem;
            color: #FDB813;
        }
        .map-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(253,184,19,0.2);
            border-radius: 20px;
            padding: 25px 40px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            color: #FDB813;
        }
        .world-map {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #0F1E33;
            border-radius: 20px;
        }
        .country-list {
            max-width: 600px;
            margin: 40px auto;
        }
        .country-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(253,184,19,0.1);
        }
    </style>
</head>
<body>
    <!-- Same navigation as other pages -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">🕊️ Peace for You Network</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="sky.html">SKY</a></li>
                <li><a href="book.html">BOOK</a></li>
                <li><a href="peace-map.html" class="active">PEACE MAP</a></li>

                <li><a href="#" class="access-btn">🔑 GET ACCESS</a></li>
            </ul>
        </div>
    </nav>

    <header class="map-header">
        <h1 class="map-title">🗺️ Peace Map</h1>
        <p>Watch peace spread across the world.</p>
    </header>

    <div class="map-stats">
        <div class="stat-card">
            <div class="stat-number">24</div>
            <div>Countries</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">1,024</div>
            <div>Voices</div>
        </div>
    </div>

    <div class="world-map">
        <svg viewBox="0 0 1000 500" style="width:100%; height:auto;">
            <circle cx="420" cy="280" r="8" fill="#FDB813" opacity="0.8"/>
            <circle cx="470" cy="250" r="6" fill="#FDB813" opacity="0.8"/>
            <circle cx="380" cy="310" r="7" fill="#FDB813" opacity="0.8"/>
            <circle cx="620" cy="200" r="9" fill="#FDB813" opacity="0.8"/>
        </svg>
    </div>

    <div class="country-list">
        <div class="country-item"><span>🇪🇹 Ethiopia</span><span>234</span></div>
        <div class="country-item"><span>🇰🇪 Kenya</span><span>156</span></div>
        <div class="country-item"><span>🇳🇬 Nigeria</span><span>189</span></div>
    </div>
